name: Scheduled Currency Analysis Report

on:
  schedule:
    # 北京时间每天早上 9:00 运行 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许你随时在 GitHub 页面点击 "Run workflow" 手动触发测试

jobs:
  run-and-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 自动缓存依赖，加快后续运行速度

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas matplotlib requests

      - name: Execute Currency Script
        env:
          # 从 GitHub Secrets 中读取敏感信息
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASS: ${{ secrets.SENDER_PASS }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          # 如果你的 API Key 也是私密的，可以加在这里
          API_ACCESS_KEY: ${{ secrets.API_ACCESS_KEY }} 
        run: |
          python get_currency.py

      - name: Upload Report as Artifact (Optional)
        # 即使邮件发送失败，你也可以在 GitHub Actions 页面直接下载生成的 HTML
        uses: actions/upload-artifact@v4
        with:
          name: currency-report
          path: paired_currency_report.html